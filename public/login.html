<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#0B0E14;color:#E7ECF3;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#12161F;padding:2rem;border-radius:16px;width:300px;text-align:center;border:1px solid #1e2530;}
h1{color:#4DF0E0;margin-bottom:0.3rem;}
p{color:#7C8696;font-size:0.85rem;margin-bottom:1.5rem;}
input{width:100%;background:#1A1F2B;border:1px solid #2a3346;border-radius:8px;padding:0.75rem 1rem;color:#E7ECF3;font-size:0.9rem;margin-bottom:0.8rem;display:block;outline:none;}
button{width:100%;padding:0.8rem;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-bottom:0.5rem;display:block;}
.c{background:#4DF0E0;color:#05070C;}
.g{background:transparent;color:#4DF0E0;border:1px solid #4DF0E0;}
.err{color:#E05C5C;font-size:0.8rem;margin-top:0.5rem;}
</style>
</head>
<body>
<div class="box">
  <h1>⚡ Pulse</h1>
  <p>Live location. Real conversations.</p>
  <input type="text" id="u" placeholder="Username" autocomplete="off">
  <input type="password" id="p" placeholder="Password">
  <button class="c" id="lb">Login</button>
  <button class="g" id="sb">Create account</button>
  <div class="err" id="e"></div>
</div>
<script>
document.getElementById('lb').onclick=function(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){document.getElementById('e').textContent='Fill both fields';return;}
  fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u,password:p})
  }).then(function(r){return r.json();}).then(function(r){
    if(r.error){document.getElementById('e').textContent=r.error;return;}
    localStorage.setItem('pt',r.token);
    localStorage.setItem('pu',r.username);
    window.location.href='/';
  }).catch(function(){document.getElementById('e').textContent='Network error';});
};

document.getElementById('sb').onclick=function(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){document.getElementById('e').textContent='Fill both fields';return;}
  if(u.length<3){document.getElementById('e').textContent='Username min 3 chars';return;}
  if(p.length<4){document.getElementById('e').textContent='Password min 4 chars';return;}
  fetch('/api/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u,password:p})
  }).then(function(r){return r.json();}).then(function(r){
    if(r.error){document.getElementById('e').textContent=r.error;return;}
    localStorage.setItem('pt',r.token);
    localStorage.setItem('pu',r.username);
    window.location.href='/';
  }).catch(function(){document.getElementById('e').textContent='Network error';});
};
</script>
</body>
    </html>
