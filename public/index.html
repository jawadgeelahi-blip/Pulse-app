<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Chat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4DF0E0">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0B0E14;color:#E7ECF3;height:100vh;}
#app{display:flex;height:100vh;}
.sb{width:220px;background:#12161F;border-right:1px solid #1e2530;display:flex;flex-direction:column;}
.sb-head{padding:0.8rem;border-bottom:1px solid #1e2530;display:flex;justify-content:space-between;align-items:center;}
.sb-name{color:#4DF0E0;font-weight:600;font-size:0.9rem;}
.lob{background:none;border:none;color:#7C8696;cursor:pointer;font-size:0.8rem;}
.srch{padding:0.5rem;border-bottom:1px solid #1e2530;}
.srch input{width:100%;background:#1A1F2B;border:1px solid #2a3346;border-radius:20px;padding:0.5rem 0.8rem;color:#E7ECF3;font-size:0.82rem;outline:none;}
.ul{flex:1;overflow-y:auto;}
.ui{padding:0.7rem 0.8rem;cursor:pointer;display:flex;align-items:center;gap:0.6rem;}
.ui:hover,.ui.act{background:rgba(77,240,224,0.06);}
.ua{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#05070C;flex-shrink:0;position:relative;}
.od{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.od.on{background:#4DF0E0;}
.un{font-size:0.85rem;flex:1;}
.ubadge{background:#4DF0E0;color:#05070C;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
.ch{flex:1;display:flex;flex-direction:column;}
.ch-hd{padding:0.8rem 1rem;background:#12161F;border-bottom:1px solid #1e2530;display:flex;align-items:center;gap:0.6rem;display:none;}
.ch-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#05070C;position:relative;flex-shrink:0;}
.od2{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.od2.on{background:#4DF0E0;}
.ch-name{font-weight:600;font-size:0.95rem;}
.ch-status{font-size:0.72rem;color:#7C8696;}
.ch-status.on{color:#4DF0E0;}
.msgs{flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:0.5rem;}
.mr{display:flex;}
.mr.me{justify-content:flex-end;}
.mb{max-width:72%;padding:0.55rem 0.85rem;border-radius:14px;font-size:0.88rem;line-height:1.45;}
.mr.them .mb{background:#1C2230;}
.mr.me .mb{background:#1B3A3D;}
.mt{font-size:0.6rem;color:#7C8696;margin-top:3px;display:flex;align-items:center;gap:3px;}
.mr.me .mt{justify-content:flex-end;}
.tk{font-size:0.72rem;color:#7C8696;}
.tk.s{color:#4DF0E0;}
.comp{display:flex;gap:0.4rem;padding:0.6rem;background:#12161F;border-top:1px solid #1e2530;align-items:center;display:none;}
.ci{flex:1;background:#1A1F2B;border:none;border-radius:20px;padding:0.6rem 1rem;color:#E7ECF3;font-size:0.88rem;outline:none;}
.ci::placeholder{color:#7C8696;}
.cb{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;background:#1A1F2B;color:#7C8696;}
.cb.s{background:#4DF0E0;color:#05070C;}
.nc{flex:1;display:flex;align-items:center;justify-content:center;color:#7C8696;flex-direction:column;gap:0.5rem;}
.lc{background:#0E1320;border:1px solid rgba(77,240,224,0.3);border-radius:12px;overflow:hidden;max-width:72%;}
.mf{width:100%;height:150px;border:none;}
.li{padding:0.5rem 0.7rem;}
.ll{color:#4DF0E0;font-size:0.8rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;}
.lco{color:#7C8696;font-size:0.7rem;font-family:monospace;}
.pd{width:7px;height:7px;border-radius:50%;background:#4DF0E0;animation:pda 2s infinite;}
@keyframes pda{0%{box-shadow:0 0 0 0 rgba(77,240,224,0.5);}70%{box-shadow:0 0 0 5px rgba(77,240,224,0);}100%{box-shadow:0 0 0 0 rgba(77,240,224,0);}}
@media(max-width:600px){.sb{width:60px;}.sb-name,.srch,.un{display:none;}.ui{justify-content:center;padding:0.6rem 0;}}
</style>
</head>
<body>
<div id="app">
  <div class="sb">
    <div class="sb-head">
      <span class="sb-name" id="myName">You</span>
      <button class="lob" onclick="logout()">Exit</button>
    </div>
    <div class="srch"><input type="text" id="si" placeholder="🔍 Search..."></div>
    <div class="ul" id="ul"></div>
  </div>
  <div class="ch">
    <div class="ch-hd" id="chh">
      <div class="ch-av" id="ca"><span id="cat">?</span><div class="od2" id="cd"></div></div>
      <div>
        <div class="ch-name" id="cn"></div>
        <div class="ch-status" id="cs">offline</div>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="nc" id="nc"><span style="font-size:2rem">💬</span><span>Select a contact to chat</span></div>
    </div>
    <div class="comp" id="comp">
      <input class="ci" type="text" id="mi" placeholder="Send a message...">
      <button class="cb s" onclick="sm()">➤</button>
    </div>
  </div>
</div>

<script>
var T=localStorage.getItem('pt'),U=localStorage.getItem('pu');
if(!T||!U){window.location.href='/login.html';}

var sk=null,ct=null,wid=null,ml=null,inc=null;
var on=new Set(),uc={};

document.getElementById('myName').textContent=U;

var sk=io({auth:{token:T}});

sk.on('user_online',function(d){
  on.add(d.username);rd();
  if(ct===d.username){document.getElementById('cs').textContent='🟢 Online';document.getElementById('cs').className='ch-status on';document.getElementById('cd').className='od2 on';}
});
sk.on('user_offline',function(d){
  on.delete(d.username);rd();
  if(ct===d.username){document.getElementById('cs').textContent='⚫ Offline';document.getElementById('cs').className='ch-status';document.getElementById('cd').className='od2';}
});
sk.on('receive_message',function(d){
  if(d.from===ct){am(d.from,d.text,d.createdAt);}
  else{uc[d.from]=(uc[d.from]||0)+1;ub(d.from);sn(d.from,d.text);}
});
sk.on('msg_seen',function(){document.querySelectorAll('.tk').forEach(function(t){t.className='tk s';t.textContent='✓✓';});});
sk.on('location_received',function(d){if(d.from===ct)ulc(d.from,d.lat,d.lng,d.accuracy);});

if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();

lu();sw2();

function lu(){
  fetch('/api/friends',{headers:{Authorization:'Bearer '+T}})
  .then(function(r){return r.json();})
  .then(function(users){
    var list=document.getElementById('ul');
    if(!users||users.error||users.length===0){
      list.innerHTML='<div style="padding:1rem;color:#7C8696;font-size:0.8rem;text-align:center;">No friends yet</div>';return;
    }
    list.innerHTML='';
    users.forEach(function(u){
      var d=document.createElement('div');d.className='ui';d.dataset.u=u.username;
      var io2=on.has(u.username),nb=uc[u.username]||0;
      d.innerHTML='<div class="ua">'+u.username[0].toUpperCase()+'<div class="od'+(io2?' on':'')+'"></div></div><span class="un">'+u.username+'</span>'+(nb>0?'<span class="ubadge">'+nb+'</span>':'');
      d.onclick=function(){oc(u.username);};
      list.appendChild(d);
    });
  });
  setTimeout(lu,30000);
}

function rd(){document.querySelectorAll('.ui').forEach(function(i){var d=i.querySelector('.od');if(d)d.className='od'+(on.has(i.dataset.u)?' on':'');});}

function ub(u){
  var i=document.querySelector('.ui[data-u="'+u+'"]');if(!i)return;
  var e=i.querySelector('.ubadge'),c=uc[u]||0;
  if(c>0){if(e)e.textContent=c;else i.innerHTML+='<span class="ubadge">'+c+'</span>';}
}

document.getElementById('si').oninput=function(){
  var q=this.value.toLowerCase();
  document.querySelectorAll('.ui').forEach(function(i){i.style.display=i.dataset.u.toLowerCase().includes(q)?'flex':'none';});
};

function oc(u){
  ct=u;inc=null;uc[u]=0;
  document.getElementById('nc').style.display='none';
  document.getElementById('chh').style.display='flex';
  document.getElementById('comp').style.display='flex';
  document.getElementById('cat').textContent=u[0].toUpperCase();
  document.getElementById('cn').textContent=u;
  var io2=on.has(u);
  document.getElementById('cs').textContent=io2?'🟢 Online':'⚫ Offline';
  document.getElementById('cs').className='ch-status'+(io2?' on':'');
  document.getElementById('cd').className='od2'+(io2?' on':'');
  document.querySelectorAll('.ui').forEach(function(i){
    i.classList.toggle('act',i.dataset.u===u);
    if(i.dataset.u===u){var b=i.querySelector('.ubadge');if(b)b.remove();}
  });
  var msgs=document.getElementById('msgs');msgs.innerHTML='';
  fetch('/api/messages/'+u,{headers:{Authorization:'Bearer '+T}})
  .then(function(r){return r.json();})
  .then(function(h){
    if(h&&!h.error&&h.length>0)h.forEach(function(m){am(m.from,m.text,m.createdAt,false);});
    else msgs.innerHTML='<div class="nc"><span style="font-size:2rem">💬</span><span>Say hello!</span></div>';
    msgs.scrollTop=msgs.scrollHeight;
  });
  if(ml&&sk)sk.emit('location_update',{to:u,lat:ml.lat,lng:ml.lng,accuracy:ml.accuracy});
}

function sm(){
  var i=document.getElementById('mi'),t=i.value.trim();
  if(!t||!ct)return;
  sk.emit('send_message',{to:ct,text:t});
  am(U,t,new Date(),true,true);
  i.value='';
}
document.getElementById('mi').onkeydown=function(e){if(e.key==='Enter')sm();};

function am(f,t,tm,sc,tk){
  if(sc===undefined)sc=true;
  var msgs=document.getElementById('msgs');
  var nc=msgs.querySelector('.nc');if(nc)nc.remove();
  var im=f===U,ti=new Date(tm).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var r=document.createElement('div');r.className='mr '+(im?'me':'them');
  r.innerHTML='<div class="mb">'+es(t)+'<div class="mt">'+ti+(im?'<span class="tk'+(tk?' ':' s')+'">✓✓</span>':'')+'</div></div>';
  msgs.appendChild(r);if(sc)msgs.scrollTop=msgs.scrollHeight;
}

function sw2(){
  if(!navigator.geolocation)return;
  wid=navigator.geolocation.watchPosition(function(p){
    ml={lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy};
    if(ct&&sk)sk.emit('location_update',{to:ct,lat:ml.lat,lng:ml.lng,accuracy:ml.accuracy});
  },function(){},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}

function ulc(f,lat,lng,ac){
  var msgs=document.getElementById('msgs');
  var mu='https://maps.google.com/maps?q='+lat+','+lng+'&z=15&output=embed';
  if(!inc){
    inc=document.createElement('div');inc.className='mr them';
    inc.innerHTML='<div class="lc"><iframe class="mf" id="lm" src="'+mu+'" allowfullscreen></iframe><div class="li"><div class="ll"><span class="pd"></span>'+f+'\'s live location</div><div class="lco" id="lco">'+lat.toFixed(5)+'°N, '+lng.toFixed(5)+'°E</div></div></div>';
    msgs.appendChild(inc);
  } else {
    var ifr=document.getElementById('lm');if(ifr)ifr.src=mu;
    var lco=document.getElementById('lco');if(lco)lco.textContent=lat.toFixed(5)+'°N, '+lng.toFixed(5)+'°E';
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function sn(f,t){
  if('Notification'in window&&Notification.permission==='granted'&&document.hidden)
    new Notification('⚡ '+f,{body:t,icon:'https://i.ibb.co/LDy7PpM4/image.png'});
}

function logout(){
  localStorage.removeItem('pt');localStorage.removeItem('pu');
  window.location.href='/login.html';
}

function es(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
  </html>
