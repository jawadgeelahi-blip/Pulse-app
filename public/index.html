<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Chat</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0B0E14;--panel:#12161F;--border:#1e2530;--cyan:#4DF0E0;--text:#E7ECF3;--sub:#7C8696;--red:#E05C5C;--bme:#1B3A3D;--bthem:#1C2230;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
body.light{--bg:#F0F4F8;--panel:#fff;--border:#dde3ec;--text:#1a1f2b;--sub:#6b7280;--bme:#c9f3ef;--bthem:#e8ecf2;}
.hide{display:none!important;}
.fp{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
.box{background:var(--panel);padding:2rem;border-radius:16px;width:300px;text-align:center;border:1px solid var(--border);}
.box h1{color:var(--cyan);font-size:1.5rem;margin-bottom:.3rem;}
.sub{color:var(--sub);font-size:.85rem;margin-bottom:1.5rem;}
.inp{width:100%;background:#1A1F2B;border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-size:.9rem;margin-bottom:.8rem;display:block;outline:none;}
.btn{width:100%;padding:.8rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;margin-bottom:.5rem;display:block;}
.btn-c{background:var(--cyan);color:#05070C;}
.btn-g{background:transparent;color:var(--cyan);border:1px solid var(--cyan);}
.btn-r{background:#E05C5C;color:#fff;}
.err{color:#E05C5C;font-size:.8rem;margin-top:.5rem;min-height:1rem;}
</style>
</head>
<body>

<div class="fp" id="authPage">
  <div class="box">
    <h1>⚡ Pulse</h1>
    <div class="sub">Live location. Real conversations.</div>
    <input class="inp" type="text" id="au" placeholder="Username" autocomplete="off">
    <input class="inp" type="password" id="ap" placeholder="Password">
    <button class="btn btn-c" onclick="doAuth('login')">Login</button>
    <button class="btn btn-g" onclick="doAuth('signup')">Create account</button>
    <div class="err" id="authErr"></div>
  </div>
</div>

<script>
function doAuth(type){
  var u=document.getElementById('au').value.trim();
  var p=document.getElementById('ap').value;
  var err=document.getElementById('authErr');
  err.textContent='';
  if(!u||!p){err.textContent='Fill both fields';return;}
  if(type==='signup'&&u.length<3){err.textContent='Username min 3';return;}
  if(type==='signup'&&p.length<4){err.textContent='Password min 4';return;}
  err.textContent=type==='login'?'Logging in...':'Creating account...';
  fetch('/api/'+type,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u,password:p})
  }).then(function(r){return r.json();}).then(function(r){
    if(r.error){err.textContent=r.error;return;}
    localStorage.setItem('pt',r.token);
    localStorage.setItem('pu',r.username);
    err.textContent='Success!';
    setTimeout(function(){window.location.reload();},500);
  }).catch(function(e){err.textContent='Error: '+e.message;});
}
</script>
</body>
  </html>
