<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Chat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4DF0E0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pulse">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0B0E14;color:#E7ECF3;height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#12161F;padding:2rem;border-radius:16px;width:320px;text-align:center;}
.box h1{color:#4DF0E0;font-size:1.5rem;margin-bottom:0.3rem;}
.box p{color:#7C8696;font-size:0.85rem;margin-bottom:1.5rem;}
input{width:100%;background:#1A1F2B;border:1px solid #2a3346;border-radius:8px;padding:0.75rem 1rem;color:#E7ECF3;font-size:0.9rem;margin-bottom:0.8rem;display:block;}
button{width:100%;padding:0.8rem;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-bottom:0.5rem;}
#loginBtn{background:#4DF0E0;color:#05070C;}
#signupBtn{background:transparent;color:#4DF0E0;border:1px solid #4DF0E0;}
.err{color:#E05C5C;font-size:0.8rem;margin-top:0.5rem;min-height:1rem;}
.hidden{display:none!important;}
#gateBox{text-align:center;}
#gateBox h2{color:#E7ECF3;margin-bottom:0.7rem;}
#gateBox p{color:#7C8696;font-size:0.85rem;margin-bottom:1.5rem;}
#gateBtn{background:#4DF0E0;color:#05070C;}
#appScreen{display:none;width:100%;height:100vh;flex-direction:row;}
.sidebar{width:220px;background:#12161F;border-right:1px solid #1e2530;display:flex;flex-direction:column;}
.sid-head{padding:0.8rem;border-bottom:1px solid #1e2530;display:flex;justify-content:space-between;align-items:center;}
.sid-head span{color:#4DF0E0;font-weight:600;font-size:0.9rem;}
#logoutBtn{background:none;border:none;color:#7C8696;cursor:pointer;font-size:0.75rem;width:auto;padding:0.3rem;}
.search-box{padding:0.5rem;border-bottom:1px solid #1e2530;}
.search-box input{margin:0;padding:0.5rem 0.8rem;font-size:0.82rem;border-radius:20px;}
.sid-head2{padding:0.5rem 0.8rem;font-size:0.7rem;color:#7C8696;text-transform:uppercase;}
#userList{flex:1;overflow-y:auto;}
.uitem{padding:0.6rem 0.8rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;position:relative;}
.uitem:hover,.uitem.active{background:rgba(77,240,224,0.08);}
.uav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#05070C;flex-shrink:0;position:relative;overflow:hidden;}
.uav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.uav .odot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.uav .odot.on{background:#4DF0E0;}
.uname{font-size:0.85rem;flex:1;}
.unread{background:#4DF0E0;color:#05070C;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
.chat{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-hd{padding:0.8rem 1rem;background:#12161F;border-bottom:1px solid #1e2530;display:flex;align-items:center;gap:0.6rem;}
.chat-hd .av2{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#05070C;position:relative;overflow:hidden;flex-shrink:0;}
.av2 img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.av2 .odot2{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.av2 .odot2.on{background:#4DF0E0;}
#chatName{font-weight:600;font-size:0.9rem;}
#chatStatus{font-size:0.7rem;color:#7C8696;}
#chatStatus.online{color:#4DF0E0;}
.msgs{flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:0.5rem;}
.mrow{display:flex;position:relative;}
.mrow.me{justify-content:flex-end;}
.mbub{max-width:70%;padding:0.5rem 0.8rem;border-radius:12px;font-size:0.88rem;line-height:1.4;position:relative;}
.mrow.them .mbub{background:#1C2230;border-bottom-left-radius:3px;}
.mrow.me .mbub{background:#1B3A3D;border-bottom-right-radius:3px;}
.mtime{font-size:0.6rem;color:#7C8696;margin-top:3px;display:flex;align-items:center;gap:3px;}
.mrow.me .mtime{justify-content:flex-end;}
.tick{font-size:0.7rem;color:#7C8696;}
.tick.seen{color:#4DF0E0;}
.del-btn{display:none;position:absolute;top:0;right:-25px;background:none;border:none;color:#E05C5C;cursor:pointer;font-size:0.8rem;width:20px;padding:0;}
.mrow:hover .del-btn{display:block;}
.mrow.them:hover .del-btn{right:auto;left:-25px;}
.comp{display:flex;gap:0.5rem;padding:0.7rem;background:#12161F;border-top:1px solid #1e2530;align-items:center;}
.comp-input{flex:1;background:#1A1F2B;border:none;border-radius:20px;padding:0.6rem 1rem;color:#E7ECF3;font-size:0.88rem;outline:none;}
.comp-input::placeholder{color:#7C8696;}
.comp-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;background:#1A1F2B;color:#7C8696;}
.comp-btn.send{background:#4DF0E0;color:#05070C;}
.comp-btn.recording{background:#E05C5C;color:white;animation:pulse 1s infinite;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
.nochat{flex:1;display:flex;align-items:center;justify-content:center;color:#7C8696;font-size:0.9rem;flex-direction:column;gap:0.5rem;}
/* Emoji picker */
.emoji-picker{position:absolute;bottom:60px;left:0;background:#12161F;border:1px solid #1e2530;border-radius:12px;padding:0.5rem;display:flex;flex-wrap:wrap;gap:5px;width:250px;max-height:200px;overflow-y:auto;z-index:10;}
/* Profile pic */
.profile-pic-input{display:none;}
/* Map */
.loc-card{background:#0E1320;border:1px solid rgba(77,240,224,0.3);border-radius:12px;overflow:hidden;max-width:70%;}
.map-frame{width:100%;height:150px;border:none;}
.loc-info{padding:0.5rem 0.7rem;}
.loc-label{color:#4DF0E0;font-size:0.8rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;}
.loc-coords{color:#7C8696;font-size:0.7rem;margin-top:0.2rem;font-family:monospace;}
.pdot{width:7px;height:7px;border-radius:50%;background:#4DF0E0;animation:pd 2s infinite;}
@keyframes pd{0%{box-shadow:0 0 0 0 rgba(77,240,224,0.5);}70%{box-shadow:0 0 0 5px rgba(77,240,224,0);}100%{box-shadow:0 0 0 0 rgba(77,240,224,0);}}
/* Voice msg */
.voice-msg{display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;}
.voice-play{background:#4DF0E0;color:#05070C;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;}
.voice-bar{flex:1;height:3px;background:#2a3346;border-radius:2px;}
/* Photo msg */
.photo-msg{max-width:200px;border-radius:10px;overflow:hidden;}
.photo-msg img{width:100%;display:block;cursor:pointer;}
@media(max-width:600px){
.sidebar{width:65px;}
.sid-head span,.sid-head2,.uname,.search-box{display:none;}
.uitem{justify-content:center;padding:0.6rem 0;}
}
</style>
</head>
<body>

<div id="authScreen" class="box">
  <h1>⚡ Pulse</h1>
  <p>Live location. Real conversations.</p>
  <input type="text" id="u" placeholder="Username">
  <input type="password" id="p" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Create account</button>
  <div class="err" id="authErr"></div>
</div>

<div id="gateScreen" class="box hidden">
  <div id="gateBox">
    <h2>📍 Location required</h2>
    <p>Allow your location to unlock the chat app.</p>
    <button id="gateBtn">Allow location & open app</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div id="appScreen">
  <div class="sidebar">
    <div class="sid-head">
      <span id="myName">You</span>
      <button id="logoutBtn">⏏</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchIn" placeholder="🔍 Search...">
    </div>
    <div class="sid-head2">Contacts</div>
    <div id="userList"></div>
  </div>
  <div class="chat">
    <div class="chat-hd" id="chatHd" style="display:none;">
      <div class="av2" id="chatAv" style="cursor:pointer;" title="Change profile pic">
        <span id="chatAvTxt">?</span>
        <div class="odot2" id="chatDot"></div>
      </div>
      <div style="flex:1;">
        <div id="chatName">—</div>
        <div id="chatStatus">offline</div>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="nochat" id="nochat">
        <span style="font-size:2.5rem;">💬</span>
        <span>Select a contact to chat</span>
      </div>
    </div>
    <div id="emojiPicker" class="emoji-picker hidden">
      😀😂😍🥰😎😭😡🤔👍👎❤️🔥💯🎉😊🙏💪🤣😅😇🥳😏😒🤩😴🤗😱🤯🥺😤
    </div>
    <div class="comp" id="comp" style="display:none;" style="position:relative;">
      <button class="comp-btn" id="emojiBtn">😊</button>
      <button class="comp-btn" id="photoBtn">📷</button>
      <input type="file" id="photoInput" class="profile-pic-input" accept="image/*">
      <input type="text" class="comp-input" id="msgIn" placeholder="Send a message...">
      <button class="comp-btn" id="voiceBtn">🎤</button>
      <button class="comp-btn send" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
var token=localStorage.getItem('pt');
var myUser=localStorage.getItem('pu');
var socket=null,chat=null,locShare=true,watchId=null,myLoc=null;
var onlineSet=new Set(),incCard=null,unreadCount={};
var mediaRecorder=null,audioChunks=[],isRecording=false;
var allUsers=[];

function show(s){
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('gateScreen').classList.add('hidden');
  document.getElementById('appScreen').style.display='none';
  if(s==='auth')document.getElementById('authScreen').classList.remove('hidden');
  else if(s==='gate')document.getElementById('gateScreen').classList.remove('hidden');
  else if(s==='app')document.getElementById('appScreen').style.display='flex';
}

window.addEventListener('load',function(){
  if(token&&myUser)show('gate');else show('auth');
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
});

document.getElementById('loginBtn').addEventListener('click',function(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){setErr('authErr','Fill both fields');return;}
  api('/api/login',{method:'POST',body:{username:u,password:p}}).then(function(r){
    if(r.error){setErr('authErr',r.error);return;}
    save(r.token,r.username);show('gate');
  });
});

document.getElementById('signupBtn').addEventListener('click',function(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){setErr('authErr','Fill both fields');return;}
  api('/api/signup',{method:'POST',body:{username:u,password:p}}).then(function(r){
    if(r.error){setErr('authErr',r.error);return;}
    save(r.token,r.username);show('gate');
  });
});

document.getElementById('gateBtn').addEventListener('click',function(){
  if(!navigator.geolocation){setErr('gateErr','Not supported');return;}
  document.getElementById('gateBtn').textContent='Getting location...';
  document.getElementById('gateBtn').disabled=true;
  navigator.geolocation.getCurrentPosition(function(pos){
    myLoc={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
    openApp();
  },function(){
    setErr('gateErr','Location denied.');
    document.getElementById('gateBtn').disabled=false;
    document.getElementById('gateBtn').textContent='Allow location & open app';
  },{enableHighAccuracy:true,timeout:10000});
});

document.getElementById('logoutBtn').addEventListener('click',function(){
  localStorage.removeItem('pt');localStorage.removeItem('pu');
  token=null;myUser=null;
  if(socket)socket.disconnect();
  if(watchId)navigator.geolocation.clearWatch(watchId);
  show('auth');
});

document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('msgIn').addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});

// Search
document.getElementById('searchIn').addEventListener('input',function(){
  var q=this.value.toLowerCase();
  document.querySelectorAll('.uitem').forEach(function(i){
    var name=i.dataset.u.toLowerCase();
    i.style.display=name.includes(q)?'flex':'none';
  });
});

// Emoji
document.getElementById('emojiBtn').addEventListener('click',function(){
  document.getElementById('emojiPicker').classList.toggle('hidden');
});
document.getElementById('emojiPicker').addEventListener('click',function(e){
  if(e.target.textContent.length<=2){
    document.getElementById('msgIn').value+=e.target.textContent;
    document.getElementById('emojiPicker').classList.add('hidden');
    document.getElementById('msgIn').focus();
  }
});

// Photo
document.getElementById('photoBtn').addEventListener('click',function(){
  document.getElementById('photoInput').click();
});
document.getElementById('photoInput').addEventListener('change',function(){
  var file=this.files[0];
  if(!file||!chat)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var dataUrl=e.target.result;
    socket.emit('send_message',{to:chat,text:'[PHOTO]'+dataUrl});
    addMsg(myUser,'[PHOTO]'+dataUrl,new Date());
  };
  reader.readAsDataURL(file);
  this.value='';
});

// Voice
document.getElementById('voiceBtn').addEventListener('click',function(){
  if(!isRecording){
    startRecording();
  } else {
    stopRecording();
  }
});

function startRecording(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    mediaRecorder=new MediaRecorder(stream);
    audioChunks=[];
    mediaRecorder.ondataavailable=function(e){audioChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var blob=new Blob(audioChunks,{type:'audio/webm'});
      var reader=new FileReader();
      reader.onload=function(e){
        var dataUrl=e.target.result;
        socket.emit('send_message',{to:chat,text:'[VOICE]'+dataUrl});
        addMsg(myUser,'[VOICE]'+dataUrl,new Date());
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(function(t){t.stop();});
    };
    mediaRecorder.start();
    isRecording=true;
    document.getElementById('voiceBtn').className='comp-btn recording';
    document.getElementById('voiceBtn').textContent='⏹';
  }).catch(function(){alert('Microphone permission denied');});
}

function stopRecording(){
  if(mediaRecorder)mediaRecorder.stop();
  isRecording=false;
  document.getElementById('voiceBtn').className='comp-btn';
  document.getElementById('voiceBtn').textContent='🎤';
}

function save(t,u){token=t;myUser=u;localStorage.setItem('pt',t);localStorage.setItem('pu',u);}
function setErr(id,msg){document.getElementById(id).textContent=msg;}

function openApp(){
  document.getElementById('myName').textContent=myUser;
  show('app');
  connectSocket();
  loadUsers();
  startWatch();
}

function connectSocket(){
  socket=io({auth:{token:token}});
  socket.on('user_online',function(d){
    onlineSet.add(d.username);refreshDots();
    if(chat===d.username){
      document.getElementById('chatStatus').textContent='🟢 Online';
      document.getElementById('chatStatus').className='online';
      document.getElementById('chatDot').className='odot2 on';
    }
  });
  socket.on('user_offline',function(d){
    onlineSet.delete(d.username);refreshDots();
    if(chat===d.username){
      document.getElementById('chatStatus').textContent='⚫ Offline';
      document.getElementById('chatStatus').className='';
      document.getElementById('chatDot').className='odot2';
    }
  });
  socket.on('receive_message',function(d){
    if(d.from===chat){
      addMsg(d.from,d.text,d.createdAt);
      socket.emit('msg_seen',{to:d.from});
    } else {
      unreadCount[d.from]=(unreadCount[d.from]||0)+1;
      updateUnread(d.from);
      sendNotif(d.from,d.text.startsWith('[PHOTO]')?'📷 Photo':d.text.startsWith('[VOICE]')?'🎤 Voice message':d.text);
    }
  });
  socket.on('msg_seen',function(d){
    document.querySelectorAll('.tick').forEach(function(t){t.className='tick seen';t.textContent='✓✓';});
  });
  socket.on('location_received',function(d){
    if(d.from===chat)updateLocCard(d.from,d.lat,d.lng,d.accuracy);
  });
}

function sendNotif(from,text){
  if('Notification' in window&&Notification.permission==='granted'&&document.hidden){
    new Notification('⚡ Pulse — '+from,{body:text,icon:'https://i.ibb.co/LDy7PpM4/image.png'});
  }
}

function loadUsers(){
  api('/api/users').then(function(users){
    var list=document.getElementById('userList');
    if(!users||users.error||users.length===0){
      list.innerHTML='<div style="padding:1rem;color:#7C8696;font-size:0.8rem;">No users yet</div>';return;
    }
    allUsers=users;
    list.innerHTML='';
    users.forEach(function(u){
      var d=document.createElement('div');
      d.className='uitem';d.dataset.u=u.username;
      var isOn=onlineSet.has(u.username);
      var unread=unreadCount[u.username]||0;
      d.innerHTML='<div class="uav">'+u.username[0].toUpperCase()+'<div class="odot'+(isOn?' on':'')+'"></div></div><span class="uname">'+u.username+'</span>'+(unread>0?'<span class="unread">'+unread+'</span>':'');
      d.addEventListener('click',function(){openChat(u.username);});
      list.appendChild(d);
    });
  });
  setTimeout(loadUsers,30000);
}

function refreshDots(){
  document.querySelectorAll('.uitem').forEach(function(i){
    var dot=i.querySelector('.odot');
    if(dot)dot.className='odot'+(onlineSet.has(i.dataset.u)?' on':'');
  });
}

function updateUnread(username){
  var item=document.querySelector('.uitem[data-u="'+username+'"]');
  if(!item)return;
  var existing=item.querySelector('.unread');
  var count=unreadCount[username]||0;
  if(count>0){
    if(existing)existing.textContent=count;
    else item.innerHTML+='<span class="unread">'+count+'</span>';
  }
}

function openChat(username){
  chat=username;incCard=null;
  unreadCount[username]=0;
  document.getElementById('nochat').style.display='none';
  document.getElementById('chatHd').style.display='flex';
  document.getElementById('comp').style.display='flex';
  document.getElementById('chatAvTxt').textContent=username[0].toUpperCase();
  document.getElementById('chatName').textContent=username;
  var isOn=onlineSet.has(username);
  document.getElementById('chatStatus').textContent=isOn?'🟢 Online':'⚫ Offline';
  document.getElementById('chatStatus').className=isOn?'online':'';
  document.getElementById('chatDot').className='odot2'+(isOn?' on':'');
  document.querySelectorAll('.uitem').forEach(function(i){
    i.classList.toggle('active',i.dataset.u===username);
    if(i.dataset.u===username){var u=i.querySelector('.unread');if(u)u.remove();}
  });
  var msgs=document.getElementById('msgs');
  msgs.innerHTML='';
  api('/api/messages/'+username).then(function(h){
    if(h&&!h.error&&h.length>0){h.forEach(function(m){addMsg(m.from,m.text,m.createdAt,false);});}
    else{msgs.innerHTML='<div class="nochat"><span style="font-size:2rem;">💬</span><span>No messages yet!</span></div>';}
    msgs.scrollTop=msgs.scrollHeight;
  });
  if(locShare&&myLoc&&socket)socket.emit('location_update',{to:username,lat:myLoc.lat,lng:myLoc.lng,accuracy:myLoc.accuracy});
}

function sendMsg(){
  var inp=document.getElementById('msgIn');
  var txt=inp.value.trim();
  if(!txt||!chat||!socket)return;
  socket.emit('send_message',{to:chat,text:txt});
  addMsg(myUser,txt,new Date(),true,true);
  inp.value='';
  document.getElementById('emojiPicker').classList.add('hidden');
}

function addMsg(from,text,time,scroll,showTick){
  if(scroll===undefined)scroll=true;
  var msgs=document.getElementBy
