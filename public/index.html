<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Chat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4DF0E0">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0B0E14;color:#E7ECF3;height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#12161F;padding:2rem;border-radius:16px;width:320px;text-align:center;border:1px solid #1e2530;}
h1{color:#4DF0E0;font-size:1.5rem;margin-bottom:0.3rem;}
.sub{color:#7C8696;font-size:0.85rem;margin-bottom:1.5rem;}
.inp{width:100%;background:#1A1F2B;border:1px solid #2a3346;border-radius:8px;padding:0.75rem 1rem;color:#E7ECF3;font-size:0.9rem;margin-bottom:0.8rem;display:block;outline:none;}
.btn{width:100%;padding:0.8rem;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-bottom:0.5rem;display:block;}
.btn-c{background:#4DF0E0;color:#05070C;}
.btn-g{background:transparent;color:#4DF0E0;border:1px solid #4DF0E0;}
.err{color:#E05C5C;font-size:0.8rem;margin-top:0.5rem;min-height:1rem;}
.hide{display:none!important;}
/* App */
#app{display:none;width:100vw;height:100vh;flex-direction:row;position:fixed;top:0;left:0;}
.sb{width:220px;background:#12161F;border-right:1px solid #1e2530;display:flex;flex-direction:column;flex-shrink:0;}
.sbh{padding:0.8rem;border-bottom:1px solid #1e2530;display:flex;justify-content:space-between;align-items:center;}
.sbh .me{color:#4DF0E0;font-weight:600;font-size:0.9rem;}
.lob{background:none;border:none;color:#7C8696;cursor:pointer;font-size:0.8rem;width:auto;padding:0.3rem;}
.srch{padding:0.5rem;border-bottom:1px solid #1e2530;}
.srch input{width:100%;background:#1A1F2B;border:1px solid #2a3346;border-radius:20px;padding:0.5rem 0.8rem;color:#E7ECF3;font-size:0.82rem;outline:none;}
.ul{flex:1;overflow-y:auto;}
.ui{padding:0.6rem 0.8rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;}
.ui:hover,.ui.act{background:rgba(77,240,224,0.08);}
.ua{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#05070C;flex-shrink:0;position:relative;}
.od{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.od.on{background:#4DF0E0;}
.un{font-size:0.85rem;flex:1;}
.ubadge{background:#4DF0E0;color:#05070C;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
.ch{flex:1;display:flex;flex-direction:column;min-width:0;}
.chh{padding:0.8rem 1rem;background:#12161F;border-bottom:1px solid #1e2530;display:flex;align-items:center;gap:0.6rem;flex-shrink:0;}
.cha{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;color:#05070C;position:relative;flex-shrink:0;}
.od2{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.od2.on{background:#4DF0E0;}
.chn{font-weight:600;font-size:0.9rem;}
.chs{font-size:0.7rem;color:#7C8696;}
.chs.on{color:#4DF0E0;}
.msgs{flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:0.5rem;}
.mr{display:flex;}
.mr.me{justify-content:flex-end;}
.mb{max-width:70%;padding:0.5rem 0.8rem;border-radius:12px;font-size:0.88rem;line-height:1.4;}
.mr.them .mb{background:#1C2230;}
.mr.me .mb{background:#1B3A3D;}
.mt{font-size:0.6rem;color:#7C8696;margin-top:3px;display:flex;align-items:center;gap:3px;}
.mr.me .mt{justify-content:flex-end;}
.tk{font-size:0.7rem;color:#7C8696;}
.tk.s{color:#4DF0E0;}
.comp{display:flex;gap:0.4rem;padding:0.6rem;background:#12161F;border-top:1px solid #1e2530;align-items:center;flex-shrink:0;}
.ci{flex:1;background:#1A1F2B;border:none;border-radius:20px;padding:0.6rem 1rem;color:#E7ECF3;font-size:0.88rem;outline:none;}
.ci::placeholder{color:#7C8696;}
.cb{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;background:#1A1F2B;color:#7C8696;}
.cb.s{background:#4DF0E0;color:#05070C;}
.cb.rec{background:#E05C5C;color:white;}
.nc{flex:1;display:flex;align-items:center;justify-content:center;color:#7C8696;flex-direction:column;gap:0.5rem;}
.ep{position:absolute;bottom:55px;left:220px;background:#12161F;border:1px solid #1e2530;border-radius:12px;padding:0.5rem;display:flex;flex-wrap:wrap;gap:4px;width:240px;z-index:10;}
.lc{background:#0E1320;border:1px solid rgba(77,240,224,0.3);border-radius:12px;overflow:hidden;max-width:70%;}
.mf{width:100%;height:140px;border:none;}
.li{padding:0.5rem 0.7rem;}
.ll{color:#4DF0E0;font-size:0.8rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;}
.lco{color:#7C8696;font-size:0.7rem;font-family:monospace;}
.pd{width:7px;height:7px;border-radius:50%;background:#4DF0E0;animation:pda 2s infinite;}
@keyframes pda{0%{box-shadow:0 0 0 0 rgba(77,240,224,0.5);}70%{box-shadow:0 0 0 5px rgba(77,240,224,0);}100%{box-shadow:0 0 0 0 rgba(77,240,224,0);}}
.pm{max-width:200px;border-radius:10px;overflow:hidden;cursor:pointer;}
.pm img{width:100%;display:block;}
.vm{display:flex;align-items:center;gap:0.5rem;}
.vp{background:#4DF0E0;color:#05070C;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:0.8rem;}
@media(max-width:600px){
.sb{width:60px;}
.sbh .me,.srch,.un{display:none;}
.ui{justify-content:center;padding:0.5rem 0;}
.ep{left:60px;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">
    <h1>⚡ Pulse</h1>
    <div class="sub">Live location. Real conversations.</div>
    <input class="inp" type="text" id="u" placeholder="Username" autocomplete="off">
    <input class="inp" type="password" id="p" placeholder="Password">
    <button class="btn btn-c" id="lb">Login</button>
    <button class="btn btn-g" id="sb2">Create account</button>
    <div class="err" id="ae"></div>
  </div>
</div>

<!-- GATE -->
<div id="gate" class="hide">
  <div class="box">
    <h1>📍 Pulse</h1>
    <div class="sub">Allow location to unlock chat.</div>
    <button class="btn btn-c" id="gb">Allow location & open app</button>
    <div class="err" id="ge"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sb">
    <div class="sbh">
      <span class="me" id="mn"></span>
      <button class="lob" id="lob">Exit</button>
    </div>
    <div class="srch"><input type="text" id="si" placeholder="🔍 Search..."></div>
    <div class="ul" id="ul"></div>
  </div>
  <div class="ch">
    <div class="chh hide" id="chh">
      <div class="cha" id="ca"><span id="cat">?</span><div class="od2" id="cd"></div></div>
      <div style="flex:1">
        <div class="chn" id="cn"></div>
        <div class="chs" id="cs">offline</div>
      </div>
    </div>
    <div class="msgs" id="msgs"><div class="nc" id="nc"><span style="font-size:2rem">💬</span><span>Select a contact</span></div></div>
    <div class="comp hide" id="comp">
      <button class="cb" id="eb">😊</button>
      <button class="cb" id="pb">📷</button>
      <input type="file" id="pi" accept="image/*" style="display:none">
      <input class="ci" type="text" id="mi" placeholder="Send a message...">
      <button class="cb" id="vb">🎤</button>
      <button class="cb s" id="snb">➤</button>
    </div>
  </div>
  <div class="ep hide" id="ep">😀😂😍🥰😎😭😡🤔👍👎❤️🔥💯🎉😊🙏💪🤣😅😇🥳😏😒🤩😴🤗😱🤯🥺😤</div>
</div>

<script>
var T=localStorage.getItem('pt'),U=localStorage.getItem('pu');
var sk=null,ct=null,wid=null,ml=null,inc=null,mr=null,au=[];
var on=new Set(),uc={},rec=false;

function sw(s){
  document.getElementById('auth').className=s==='auth'?'':'hide';
  document.getElementById('gate').className=s==='gate'?'':'hide';
  document.getElementById('app').style.display=s==='app'?'flex':'none';
}

window.onload=function(){
  sw(T&&U?'gate':'auth');
  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();
};

document.getElementById('lb').onclick=function(){
  var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  if(!u||!p){document.getElementById('ae').textContent='Fill both fields';return;}
  ap('/api/login',{method:'POST',body:{username:u,password:p}}).then(function(r){
    if(r.error){document.getElementById('ae').textContent=r.error;return;}
    sv(r.token,r.username);sw('gate');
  });
};

document.getElementById('sb2').onclick=function(){
  var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  if(!u||!p){document.getElementById('ae').textContent='Fill both fields';return;}
  ap('/api/signup',{method:'POST',body:{username:u,password:p}}).then(function(r){
    if(r.error){document.getElementById('ae').textContent=r.error;return;}
    sv(r.token,r.username);sw('gate');
  });
};

document.getElementById('gb').onclick=function(){
  var btn=document.getElementById('gb');
  btn.textContent='Getting location...';btn.disabled=true;
  navigator.geolocation.getCurrentPosition(function(pos){
    ml={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
    oa();
  },function(){
    document.getElementById('ge').textContent='Location denied.';
    btn.disabled=false;btn.textContent='Allow location & open app';
  },{enableHighAccuracy:true,timeout:10000});
};

document.getElementById('lob').onclick=function(){
  localStorage.removeItem('pt');localStorage.removeItem('pu');
  T=null;U=null;if(sk)sk.disconnect();if(wid)navigator.geolocation.clearWatch(wid);sw('auth');
};

document.getElementById('snb').onclick=sm;
document.getElementById('mi').onkeydown=function(e){if(e.key==='Enter')sm();};

document.getElementById('si').oninput=function(){
  var q=this.value.toLowerCase();
  document.querySelectorAll('.ui').forEach(function(i){i.style.display=i.dataset.u.toLowerCase().includes(q)?'flex':'none';});
};

document.getElementById('eb').onclick=function(){document.getElementById('ep').classList.toggle('hide');};
document.getElementById('ep').onclick=function(e){
  var ch=e.target.textContent;
  if(ch&&ch.length<=2){document.getElementById('mi').value+=ch;document.getElementById('ep').classList.add('hide');}
};

document.getElementById('pb').onclick=function(){document.getElementById('pi').click();};
document.getElementById('pi').onchange=function(){
  var f=this.files[0];if(!f||!ct)return;
  var rd=new FileReader();
  rd.onload=function(e){
    sk.emit('send_message',{to:ct,text:'[P]'+e.target.result});
    am(U,'[P]'+e.target.result,new Date());
  };
  rd.readAsDataURL(f);this.value='';
};

document.getElementById('vb').onclick=function(){rec?sr():str();};

function str(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    mr=new MediaRecorder(stream);var ch=[];
    mr.ondataavailable=function(e){ch.push(e.data);};
    mr.onstop=function(){
      var rd=new FileReader();
      rd.onload=function(e){sk.emit('send_message',{to:ct,text:'[V]'+e.target.result});am(U,'[V]'+e.target.result,new Date());};
      rd.readAsDataURL(new Blob(ch,{type:'audio/webm'}));
      stream.getTracks().forEach(function(t){t.stop();});
    };
    mr.start();rec=true;
    document.getElementById('vb').className='cb rec';
    document.getElementById('vb').textContent='⏹';
  }).catch(function(){alert('Mic denied');});
}
function sr(){if(mr)mr.stop();rec=false;document.getElementById('vb').className='cb';document.getElementById('vb').textContent='🎤';}

function sv(t,u){T=t;U=u;localStorage.setItem('pt',t);localStorage.setItem('pu',u);}

function oa(){
  document.getElementById('mn').textContent=U;
  sw('app');cs2();lu();sw2();
}

function cs2(){
  sk=io({auth:{token:T}});
  sk.on('user_online',function(d){
    on.add(d.username);rd();
    if(ct===d.username){document.getElementById('cs').textContent='🟢 Online';document.getElementById('cs').className='chs on';document.getElementById('cd').className='od2 on';}
  });
  sk.on('user_offline',function(d){
    on.delete(d.username);rd();
    if(ct===d.username){document.getElementById('cs').textContent='⚫ Offline';document.getElementById('cs').className='chs';document.getElementById('cd').className='od2';}
  });
  sk.on('receive_message',function(d){
    if(d.from===ct){am(d.from,d.text,d.createdAt);sk.emit('msg_seen',{to:d.from});}
    else{uc[d.from]=(uc[d.from]||0)+1;ub(d.from);sn(d.from,d.text.startsWith('[P]')?'📷 Photo':d.text.startsWith('[V]')?'🎤 Voice':d.text);}
  });
  sk.on('msg_seen',function(){document.querySelectorAll('.tk').forEach(function(t){t.className='tk s';t.textContent='✓✓';});});
  sk.on('location_received',function(d){if(d.from===ct)ulc(d.from,d.lat,d.lng,d.accuracy);});
}

function sn(f,t){
  if('Notification'in window&&Notification.permission==='granted'&&document.hidden)
    new Notification('⚡ '+f,{body:t,icon:'https://i.ibb.co/LDy7PpM4/image.png'});
}

function lu(){
  ap('/api/users').then(function(u){
    var l=document.getElementById('ul');
    if(!u||u.error||u.length===0){l.innerHTML='<div style="padding:1rem;color:#7C8696;font-size:0.8rem;">No users yet</div>';return;}
    au=u;l.innerHTML='';
    u.forEach(function(x){
      var d=document.createElement('div');d.className='ui';d.dataset.u=x.username;
      var io=on.has(x.username),nb=uc[x.username]||0;
      d.innerHTML='<div class="ua">'+x.username[0].toUpperCase()+'<div class="od'+(io?' on':'')+'"></div></div><span class="un">'+x.username+'</span>'+(nb>0?'<span class="ubadge">'+nb+'</span>':'');
      d.onclick=function(){oc(x.username);};
      l.appendChild(d);
    });
  });
  setTimeout(lu,30000);
}

function rd(){document.querySelectorAll('.ui').forEach(function(i){var d=i.querySelector('.od');if(d)d.className='od'+(on.has(i.dataset.u)?' on':'');});}

function ub(u){
  var i=document.querySelector('.ui[data-u="'+u+'"]');if(!i)return;
  var e=i.querySelector('.ubadge'),c=uc[u]||0;
  if(c>0){if(e)e.textContent=c;else i.innerHTML+='<span class="ubadge">'+c+'</span>';}
}

function oc(u){
  ct=u;inc=null;uc[u]=0;
  document.getElementById('nc').style.display='none';
  document.getElementById('chh').classList.remove('hide');
  document.getElementById('comp').classList.remove('hide');
  document.getElementById('cat').textContent=u[0].toUpperCase();
  document.getElementById('cn').textContent=u;
  var io=on.has(u);
  document.getElementById('cs').textContent=io?'🟢 Online':'⚫ Offline';
  document.getElementById('cs').className='chs'+(io?' on':'');
  document.getElementById('cd').className='od2'+(io?' on':'');
  document.querySelectorAll('.ui').forEach(function(i){
    i.classList.toggle('act',i.dataset.u===u);
    if(i.dataset.u===u){var b=i.querySelector('.ubadge');if(b)b.remove();}
  });
  var m=document.getElementById('msgs');m.innerHTML='';
  ap('/api/messages/'+u).then(function(h){
    if(h&&!h.error&&h.length>0)h.forEach(function(x){am(x.from,x.text,x.createdAt,false);});
    else m.innerHTML='<div class="nc"><span style="font-size:2rem">💬</span><span>No messages yet!</span></div>';
    m.scrollTop=m.scrollHeight;
  });
  if(ml&&sk)sk.emit('location_update',{to:u,lat:ml.lat,lng:ml.lng,accuracy:ml.accuracy});
}

function sm(){
  var i=document.getElementById('mi'),t=i.value.trim();
  if(!t||!ct||!sk)return;
  sk.emit('send_message',{to:ct,text:t});
  am(U,t,new Date(),true,true);
  i.value='';document.getElementById('ep').classList.add('hide');
}

function am(f,t,tm,sc,tk){
  if(sc===undefined)sc=true;
  var m=document.getElementById('msgs');
  var nc=m.querySelector('.nc');if(nc)nc.remove();
  var im=f===U,ti=new Date(tm).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var r=document.createElement('div');r.className='mr '+(im?'me':'them');
  var c='';
  if(t.startsWith('[P]')){
    c='<div class="mb" style="padding:0.3rem"><div class="pm"><img src="'+t.substring(3)+'" onclick="window.open(this.src)"></div><div class="mt">'+ti+'</div></div>';
  } else if(t.startsWith('[V]')){
    c='<div class="mb"><div class="vm"><button class="vp" onclick="pv(\''+t.substring(3)+'\')">▶</button><div style="flex:1;height:3px;background:#2a3346;border-radius:2px;"></div><span style="font-size:0.7rem;color:#7C8696">Voice</span></div><div class="mt">'+ti+'</div></div>';
  } else {
    c='<div class="mb">'+es(t)+'<div class="mt">'+ti+(im?'<span class="tk'+(tk?'':' s')+'">'+(tk?'✓':'✓✓')+'</span>':'')+'</div></div>';
  }
  r.innerHTML=c;
  m.appendChild(r);if(sc)m.scrollTop=m.scrollHeight;
}

function pv(s){new Audio(s).play();}

function sw2(){
  if(!navigator.geolocation)return;
  wid=navigator.geolocation.watchPosition(function(p){
    ml={lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy};
    if(ct&&sk)sk.emit('location_update',{to:ct,lat:ml.lat,lng:ml.lng,accuracy:ml.accuracy});
  },function(){},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}

function ulc(f,lat,lng,ac){
  var m=document.getElementById('msgs');
  var mu='https://maps.google.com/maps?q='+lat+','+lng+'&z=15&output=embed';
  if(!inc){
    inc=document.createElement('div');inc.className='mr them';
    inc.innerHTML='<div class="lc"><iframe class="mf" id="lm" src="'+mu+'" allowfullscreen></iframe><div class="li"><div class="ll"><span class="pd"></span>'+f+'\'s live location</div><div class="lco" id="lco">'+lat.toFixed(5)+'°N, '+lng.toFixed(5)+'°E</div></div></div>';
    m.appendChild(inc);
  } else {
    var ifr=document.getElementById('lm');if(ifr)ifr.src=mu;
    var lco=document.getElementById('lco');if(lco)lco.textContent=lat.toFixed(5)+'°N, '+lng.toFixed(5)+'°E';
  }
  m.scrollTop=m.scrollHeight;
}

function ap(path,opts){
  opts=opts||{};
  return fetch(path,{
    method:opts.method||'GET',
    headers:{'Content-Type':'application/json',Authorization:T?'Bearer '+T:''},
    body:opts.body?JSON.stringify(opts.body):undefined
  }).then(function(r){return r.json();}).catch(function(){return{error:'Network error'};});
}

function es(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
  </html>
