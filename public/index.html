<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Live Location Chat</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14; --panel:#12161F; --bubble-them:#1C2230;
    --bubble-me:#1B3A3D; --cyan:#4DF0E0; --text:#E7ECF3;
    --sub:#7C8696; --red:#E05C5C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
  .hidden{display:none!important;}
  .screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  .auth-box{width:100%;max-width:360px;background:var(--panel);border-radius:20px;padding:2.2rem 2rem;border:1px solid rgba(255,255,255,0.07);}
  .auth-box .logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.8rem;color:var(--cyan);text-align:center;margin-bottom:0.3rem;}
  .auth-box .tagline{text-align:center;color:var(--sub);font-size:0.85rem;margin-bottom:1.8rem;}
  .auth-box input{width:100%;background:#1A1F2B;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:0.8rem 1rem;color:var(--text);font-size:0.92rem;outline:none;margin-bottom:0.8rem;}
  .auth-box input:focus{border-color:var(--cyan);}
  .auth-box .btn{width:100%;padding:0.85rem;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.95rem;cursor:pointer;}
  .btn-cyan{background:var(--cyan);color:#05070C;}
  .btn-ghost{background:transparent;color:var(--cyan);margin-top:0.5rem;border:1px solid rgba(77,240,224,0.3);}
  .auth-err{color:var(--red);font-size:0.8rem;text-align:center;margin-top:0.6rem;min-height:1.1rem;}
  .gate-box{width:100%;max-width:360px;background:var(--panel);border-radius:20px;padding:2.5rem 2rem;text-align:center;border:1px solid rgba(77,240,224,0.15);}
  .gate-icon{width:80px;height:80px;border-radius:50%;background:rgba(77,240,224,0.08);border:1px solid rgba(77,240,224,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;color:var(--cyan);}
  .gate-icon svg{width:34px;height:34px;}
  .gate-box h2{font-family:'Poppins',sans-serif;font-size:1.2rem;margin-bottom:0.7rem;}
  .gate-box p{color:var(--sub);font-size:0.87rem;line-height:1.6;margin-bottom:1.8rem;}
  .gate-box .btn{display:block;width:100%;padding:0.85rem;border:none;border-radius:10px;font-family:'Poppins',sans-serif;font-weight:600;font-size:0.95rem;cursor:pointer;}
  #appScreen{flex-direction:column;align-items:stretch;padding:0;}
  .app-layout{display:flex;height:100%;width:100%;max-width:900px;margin:0 auto;}
  .sidebar{width:220px;flex-shrink:0;background:var(--panel);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;}
  .sidebar-head{padding:1rem;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
  .sidebar-head .me{font-family:'Poppins',sans-serif;font-weight:600;font-size:0.9rem;color:var(--cyan);}
  .sidebar-head .logout{background:none;border:none;color:var(--sub);cursor:pointer;font-size:0.75rem;padding:0.3rem 0.6rem;border-radius:6px;}
  .sidebar h3{padding:0.8rem 1rem 0.4rem;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--sub);}
  .user-list{flex:1;overflow-y:auto;}
  .user-item{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1rem;cursor:pointer;transition:background .15s;}
  .user-item:hover,.user-item.active{background:rgba(77,240,224,0.06);}
  .user-item .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#2563EB);display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:0.85rem;color:#05070C;flex-shrink:0;position:relative;}
  .online-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid var(--panel);}
  .online-dot.on{background:var(--cyan);}
  .user-item .uname{font-size:0.88rem;font-weight:500;}
  .chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
  .chat-header{display:flex;align-items:center;gap:0.8rem;padding:0.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.06);background:var(--panel);flex-shrink:0;}
  .chat-header .av2{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),#2563EB);display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:0.9rem;color:#05070C;}
  .chat-header .info .name{font-family:'Poppins',sans-serif;font-weight:600;font-size:0.95rem;}
  .chat-header .info .status{font-size:0.73rem;color:var(--sub);}
  .chat-header .info .status.live{color:var(--cyan);}
  .loc-toggle{margin-left:auto;display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--sub);}
  .toggle-switch{width:40px;height:22px;border-radius:100px;background:#1A1F2B;border:1px solid rgba(255,255,255,0.08);position:relative;cursor:pointer;transition:background .2s;}
  .toggle-switch.on{background:var(--cyan);}
  .toggle-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:2px;left:2px;transition:left .2s;}
  .toggle-switch.on::after{left:20px;}
  .messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.6rem;}
  .msg-row{display:flex;}
  .msg-row.me{justify-content:flex-end;}
  .msg-bubble{max-width:72%;padding:0.6rem 0.9rem;border-radius:14px;font-size:0.9rem;line-height:1.45;}
  .msg-row.them .msg-bubble{background:var(--bubble-them);border-bottom-left-radius:3px;}
  .msg-row.me .msg-bubble{background:var(--bubble-me);border-bottom-right-radius:3px;}
  .msg-time{font-size:0.65rem;color:var(--sub);margin-top:0.25rem;}
  .msg-row.me .msg-time{text-align:right;}
  .empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);gap:0.5rem;text-align:center;}
  .loc-msg{background:var(--panel);border:1px solid rgba(77,240,224,0.2);border-radius:14px;overflow:hidden;max-width:72%;}
  .loc-map{height:120px;background:#0E1320;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .loc-map svg.grid{position:absolute;inset:0;width:100%;height:100%;opacity:0.3;}
  .loc-dot{width:14px;height:14px;border-radius:50%;background:var(--cyan);position:relative;z-index:2;}
  .loc-dot::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(77,240,224,0.4);animation:radar 2s infinite ease-out;}
  @keyframes radar{0%{transform:scale(0.5);opacity:1;}100%{transform:scale(2);opacity:0;}}
  .loc-body{padding:0.7rem 0.9rem;}
  .loc-body .loc-label{font-family:'Poppins',sans-serif;font-size:0.82rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;color:var(--cyan);}
  .loc-body .loc-coords{font-size:0.7rem;color:var(--sub);margin-top:0.25rem;font-family:'JetBrains Mono',monospace;}
  .pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:pd 2s infinite;}
  @keyframes pd{0%{box-shadow:0 0 0 0 rgba(77,240,224,0.5);}70%{box-shadow:0 0 0 5px rgba(77,240,224,0);}100%{box-shadow:0 0 0 0 rgba(77,240,224,0);}}
  .composer{display:flex;align-items:center;gap:0.6rem;padding:0.8rem 1rem;border-top:1px solid rgba(255,255,255,0.06);background:var(--panel);flex-shrink:0;}
  .composer input{flex:1;background:#1A1F2B;border:none;border-radius:100px;padding:0.65rem 1.1rem;color:var(--text);font-size:0.9rem;outline:none;}
  .composer input::placeholder{color:var(--sub);}
  .send-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--cyan);color:#05070C;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .send-btn svg{width:16px;height:16px;}
  .no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);gap:0.7rem;text-align:center;padding:2rem;}
  .no-chat svg{width:48px;height:48px;opacity:0.25;}
  @media(max-width:600px){.sidebar{width:60px;}.sidebar-head .me,.sidebar h3,.user-item .uname{display:none;}.user-item{justify-content:center;padding:0.7rem 0;}}
</style>
</head>
<body>

<div class="screen" id="authScreen">
  <div class="auth-box">
    <div class="logo">⚡ Pulse</div>
    <div class="tagline">Live location. Real conversations.</div>
    <input type="text" id="authUsername" placeholder="Username" maxlength="20" autocomplete="off">
    <input type="password" id="authPassword" placeholder="Password">
    <button class="btn btn-cyan" onclick="doLogin()">Login</button>
    <button class="btn btn-ghost" onclick="doSignup()">Create account</button>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<div class="screen hidden" id="gateScreen">
  <div class="gate-box">
    <div class="gate-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <h2>Location required to chat</h2>
    <p>Pulse shares your live location while you chat. Allow location to unlock the app.</p>
    <button class="btn btn-cyan" id="gateBtn" onclick="requestLocation()">Allow location &amp; open app</button>
    <div class="auth-err" id="gateErr"></div>
  </div>
</div>

<div class="screen hidden" id="appScreen">
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-head">
        <span class="me" id="myUsername">You</span>
        <button class="logout" onclick="logout()">Logout</button>
      </div>
      <h3>Contacts</h3>
      <div class="user-list" id="userList">
        <div style="padding:1rem;color:var(--sub);font-size:0.8rem;">Loading…</div>
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="no-chat" id="noChat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Select a contact to start chatting</p>
      </div>
      <div id="chatView" class="hidden" style="display:flex;flex-direction:column;height:100%;">
        <div class="chat-header">
          <div class="av2" id="chatAvatar">?</div>
          <div class="info">
            <div class="name" id="chatName">—</div>
            <div class="status" id="chatStatus">offline</div>
          </div>
          <div class="loc-toggle">
            <span>Share location</span>
            <div class="toggle-switch on" id="locToggle" onclick="toggleLocation()"></div>
          </div>
        </div>
        <div class="messages" id="messages">
          <div class="empty-chat" id="emptyChatMsg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>No messages yet — say hello!</span>
          </div>
        </div>
        <div class="composer">
          <input type="text" id="msgInput" placeholder="Send a message…" onkeydown="if(event.key==='Enter') sendMessage()">
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let token=localStorage.getItem('pulse_token')||null;
  let myUsername=localStorage.getItem('pulse_username')||null;
  let socket=null,currentChat=null,locationSharing=true,watchId=null,myLocation=null;
  let onlineSet=new Set(),incomingLocCard=null;

  function show(id){['authScreen','gateScreen','appScreen'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
  window.onload=()=>{if(token&&myUsername){show('gateScreen');}else{show('authScreen');}};

  async function doLogin(){
    const u=document.getElementById('authUsername').value.trim();
    const p=document.getElementById('authPassword').value;
    document.getElementById('authErr').textContent='';
    if(!u||!p)return document.getElementById('authErr').textContent='Fill in both fields';
    const res=await apiFetch('/api/login',{method:'POST',body:{username:u,password:p}});
    if(res.error)return document.getElementById('authErr').textContent=res.error;
    saveAuth(res.token,res.username);show('gateScreen');
  }

  async function doSignup(){
    const u=document.getElementById('authUsername').value.trim();
    const p=document.getElementById('authPassword').value;
    document.getElementById('authErr').textContent='';
    if(!u||!p)return document.getElementById('authErr').textContent='Fill in both fields';
    const res=await apiFetch('/api/signup',{method:'POST',body:{username:u,password:p}});
    if(res.error)return document.getElementById('authErr').textContent=res.error;
    saveAuth(res.token,res.username);show('gateScreen');
  }

  function saveAuth(t,u){token=t;myUsername=u;localStorage.setItem('pulse_token',t);localStorage.setItem('pulse_username',u);}
  function logout(){localStorage.removeItem('pulse_token');localStorage.removeItem('pulse_username');token=null;myUsername=null;if(socket)socket.disconnect();if(watchId)navigator.geolocation.clearWatch(watchId);show('authScreen');}

  function requestLocation(){
    const btn=document.getElementById('gateBtn');
    btn.textContent='Requesting…';btn.disabled=true;
    document.getElementById('gateErr').textContent='';
    if(!('geolocation' in navigator)){document.getElementById('gateErr').textContent='Geolocation not supported.';btn.disabled=false;btn.textContent='Allow location & open app';return;}
    navigator.geolocation.getCurrentPosition(
      (pos)=>{myLocation={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};openApp();},
      (err)=>{document.getElementById('gateErr').textContent=err.code===err.PERMISSION_DENIED?'Permission denied. Allow location in browser settings.':'Could not get location.';btn.disabled=false;btn.textContent='Allow location & open app';},
      {enableHighAccuracy:true,timeout:10000}
    );
  }

  function openApp(){document.getElementById('myUsername').textContent=myUsername;show('appScreen');connectSocket();loadUsers();startLocationWatch();}

  function connectSocket(){
    socket=io({auth:{token}});
    socket.on('user_online',({username})=>{onlineSet.add(username);refreshDots();if(currentChat===username)setChatStatus('online');});
    socket.on('user_offline',({username})=>{onlineSet.delete(username);refreshDots();if(currentChat===username)setChatStatus('offline');});
    socket.on('receive_message',({from,text,createdAt})=>{if(from===currentChat)appendMessage({from,text,createdAt});});
    socket.on('location_received',({from,lat,lng,accuracy})=>{if(from===currentChat)updateLocCard(from,lat,lng,accuracy);});
  }

  async function loadUsers(){
    const users=await apiFetch('/api/users');
    const list=document.getElementById('userList');
    if(!users||users.error){list.innerHTML='<div style="padding:1rem;color:var(--sub);font-size:0.8rem;">Could not load users</div>';return;}
    if(users.length===0){list.innerHTML='<div style="padding:1rem;color:var(--sub);font-size:0.8rem;">No other users yet</div>';return;}
    list.innerHTML='';
    users.forEach(u=>{
      const div=document.createElement('div');
      div.className='user-item';div.dataset.username=u.username;
      div.innerHTML=`<div class="av">${u.username[0].toUpperCase()}<div class="online-dot ${onlineSet.has(u.username)?'on':''}"></div></div><span class="uname">${u.username}</span>`;
      div.onclick=()=>openChat(u.username);
      list.appendChild(div);
    });
  }

  function refreshDots(){document.querySelectorAll('.user-item').forEach(i=>{const dot=i.querySelector('.online-dot');if(dot)dot.classList.toggle('on',onlineSet.has(i.dataset.username));});}

  async function openChat(username){
    currentChat=username;incomingLocCard=null;
    document.getElementById('noChat').classList.add('hidden');
    const cv=document.getElementById('chatView');cv.classList.remove('hidden');cv.style.display='flex';
    document.querySelectorAll('.user-item').forEach(i=>i.classList.toggle('active',i.dataset.username===username));
    document.getElementById('chatAvatar').textContent=username[0].toUpperCase();
    document.getElementById('chatName').textContent=username;
    setChatStatus(onlineSet.has(username)?'online':'offline');
    const msgs=document.getElementById('messages');msgs.innerHTML='';
    const history=await apiFetch(`/api/messages/${username}`);
    if(history&&!history.error&&history.length>0){history.forEach(m=>appendMessage(m,false));}
    else{msgs.innerHTML='<div class="empty-chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>No messages yet!</span></div>';}
    msgs.scrollTop=msgs.scrollHeight;
    if(locationSharing&&myLocation)socket.emit('location_update',{to:currentChat,...myLocation});
  }

  function setChatStatus(text){const el=document.getElementById('chatStatus');el.textContent=text;el.classList.toggle('live',text==='online');}

  function sendMessage(){
    const input=document.getElementById('msgInput');const text=input.value.trim();
    if(!text||!currentChat)return;
    socket.emit('send_message',{to:currentChat,text});
    appendMessage({from:myUsername,text,createdAt:new Date()});
    input.value='';
  }

  function appendMessage({from,text,createdAt},scroll=true){
    const msgs=document.getElementById('messages');
    const empty=msgs.querySelector('.empty-chat');if(empty)empty.remove();
    const isMe=from===myUsername;
    const time=new Date(createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const row=document.createElement('div');row.className='msg-row '+(isMe?'me':'them');
    row.innerHTML=`<div><div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${time}</div></div>`;
    msgs.appendChild(row);if(scroll)msgs.scrollTop=msgs.scrollHeight;
  }

  function startLocationWatch(){
    if(!('geolocation' in navigator))return;
    watchId=navigator.geolocation.watchPosition(
      (pos)=>{myLocation={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};if(locationSharing&&currentChat&&socket)socket.emit('location_update',{to:currentChat,...myLocation});},
      ()=>{},
      {enableHighAccuracy:true,maximumAge:5000,timeout:15000}
    );
  }

  function toggleLocation(){
    locationSharing=!locationSharing;
    document.getElementById('locToggle').classList.toggle('on',locationSharing);
    if(locationSharing&&myLocation&&currentChat)socket.emit('location_update',{to:currentChat,...myLocation});
  }

  function updateLocCard(from,lat,lng,accuracy){
    const msgs=document.getElementById('messages');
    if(!incomingLocCard){
      incomingLocCard=document.createElement('div');
      incomingLocCard.className='msg-row them';
      incomingLocCard.innerHTML=`<div class="loc-msg"><div class="loc-map"><svg class="grid" viewBox="0 0 300 120" preserveAspectRatio="none"><defs><pattern id="g2" width="25" height="25" patternUnits="userSpaceOnUse"><path d="M25 0H0V25" fill="none" stroke="#4DF0E0" stroke-width="0.5"/></pattern></defs><rect width="300" height="120" fill="url(#g2)"/></svg><div class="loc-dot"></div></div><div class="loc-body"><div class="loc-label"><span class="pulse-dot"></span>${from}'s live location</div><div class="loc-coords" id="incomingCoords">Getting fix…</div></div></div>`;
      msgs.appendChild(incom
