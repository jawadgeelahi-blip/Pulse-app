<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Chat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4DF0E0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pulse">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0B0E14;color:#E7ECF3;height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#12161F;padding:2rem;border-radius:16px;width:320px;text-align:center;}
.box h1{color:#4DF0E0;font-size:1.5rem;margin-bottom:0.3rem;}
.box p{color:#7C8696;font-size:0.85rem;margin-bottom:1.5rem;}
input{width:100%;background:#1A1F2B;border:1px solid #2a3346;border-radius:8px;padding:0.75rem 1rem;color:#E7ECF3;font-size:0.9rem;margin-bottom:0.8rem;display:block;}
button{width:100%;padding:0.8rem;border:none;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-bottom:0.5rem;}
#loginBtn{background:#4DF0E0;color:#05070C;}
#signupBtn{background:transparent;color:#4DF0E0;border:1px solid #4DF0E0;}
.err{color:#E05C5C;font-size:0.8rem;margin-top:0.5rem;min-height:1rem;}
.hidden{display:none!important;}
#gateBox{text-align:center;}
#gateBox h2{color:#E7ECF3;margin-bottom:0.7rem;}
#gateBox p{color:#7C8696;font-size:0.85rem;margin-bottom:1.5rem;}
#gateBtn{background:#4DF0E0;color:#05070C;}
#appScreen{display:none;width:100%;height:100vh;flex-direction:row;}
.sidebar{width:200px;background:#12161F;border-right:1px solid #1e2530;display:flex;flex-direction:column;}
.sid-head{padding:0.8rem;border-bottom:1px solid #1e2530;display:flex;justify-content:space-between;align-items:center;}
.sid-head span{color:#4DF0E0;font-weight:600;font-size:0.9rem;}
#logoutBtn{background:none;border:none;color:#7C8696;cursor:pointer;font-size:0.75rem;width:auto;padding:0.3rem;}
.sid-head2{padding:0.5rem 0.8rem;font-size:0.7rem;color:#7C8696;text-transform:uppercase;}
#userList{flex:1;overflow-y:auto;}
.uitem{padding:0.6rem 0.8rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;position:relative;}
.uitem:hover,.uitem.active{background:rgba(77,240,224,0.08);}
.uav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;color:#05070C;flex-shrink:0;position:relative;}
.uav .odot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.uav .odot.on{background:#4DF0E0;}
.uname{font-size:0.85rem;flex:1;}
.unread{background:#4DF0E0;color:#05070C;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;}
.chat{flex:1;display:flex;flex-direction:column;}
.chat-hd{padding:0.8rem 1rem;background:#12161F;border-bottom:1px solid #1e2530;display:flex;align-items:center;gap:0.6rem;}
.chat-hd .av2{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#4DF0E0,#2563EB);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#05070C;position:relative;}
.av2 .odot2{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:#3d3d3d;border:2px solid #12161F;}
.av2 .odot2.on{background:#4DF0E0;}
#chatName{font-weight:600;font-size:0.9rem;}
#chatStatus{font-size:0.7rem;color:#7C8696;}
#chatStatus.online{color:#4DF0E0;}
.msgs{flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:0.5rem;}
.mrow{display:flex;}
.mrow.me{justify-content:flex-end;}
.mbub{max-width:70%;padding:0.5rem 0.8rem;border-radius:12px;font-size:0.88rem;line-height:1.4;}
.mrow.them .mbub{background:#1C2230;}
.mrow.me .mbub{background:#1B3A3D;}
.comp{display:flex;gap:0.5rem;padding:0.7rem;background:#12161F;border-top:1px solid #1e2530;}
.comp input{flex:1;background:#1A1F2B;border:none;border-radius:20px;padding:0.6rem 1rem;color:#E7ECF3;font-size:0.88rem;}
.comp input::placeholder{color:#7C8696;}
#sendBtn{width:36px;height:36px;border-radius:50%;background:#4DF0E0;color:#05070C;border:none;cursor:pointer;font-size:1.2rem;flex-shrink:0;}
.nochat{flex:1;display:flex;align-items:center;justify-content:center;color:#7C8696;font-size:0.9rem;flex-direction:column;gap:0.5rem;}
/* Map */
.loc-card{background:#0E1320;border:1px solid rgba(77,240,224,0.3);border-radius:12px;overflow:hidden;max-width:70%;margin:0.3rem 0;}
.map-frame{width:100%;height:150px;border:none;}
.loc-info{padding:0.5rem 0.7rem;}
.loc-info .loc-label{color:#4DF0E0;font-size:0.8rem;font-weight:600;display:flex;align-items:center;gap:0.4rem;}
.loc-info .loc-coords{color:#7C8696;font-size:0.7rem;margin-top:0.2rem;font-family:monospace;}
.pdot{width:7px;height:7px;border-radius:50%;background:#4DF0E0;animation:pd 2s infinite;}
@keyframes pd{0%{box-shadow:0 0 0 0 rgba(77,240,224,0.5);}70%{box-shadow:0 0 0 5px rgba(77,240,224,0);}100%{box-shadow:0 0 0 0 rgba(77,240,224,0);}}
</style>
</head>
<body>

<div id="authScreen" class="box">
  <h1>⚡ Pulse</h1>
  <p>Live location. Real conversations.</p>
  <input type="text" id="u" placeholder="Username">
  <input type="password" id="p" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Create account</button>
  <div class="err" id="authErr"></div>
</div>

<div id="gateScreen" class="box hidden">
  <div id="gateBox">
    <h2>📍 Location required</h2>
    <p>Allow your location to unlock the chat app.</p>
    <button id="gateBtn">Allow location & open app</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div id="appScreen">
  <div class="sidebar">
    <div class="sid-head">
      <span id="myName">You</span>
      <button id="logoutBtn">Logout</button>
    </div>
    <div class="sid-head2">Contacts</div>
    <div id="userList"></div>
  </div>
  <div class="chat">
    <div class="chat-hd" id="chatHd" style="display:none;">
      <div class="av2" id="chatAv">?<div class="odot2" id="chatDot"></div></div>
      <div>
        <div id="chatName">—</div>
        <div id="chatStatus">offline</div>
      </div>
    </div>
    <div class="msgs" id="msgs">
      <div class="nochat" id="nochat">
        <span style="font-size:2rem;">💬</span>
        <span>Select a contact to chat</span>
      </div>
    </div>
    <div class="comp" id="comp" style="display:none;">
      <input type="text" id="msgIn" placeholder="Send a message...">
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
var token=localStorage.getItem('pt');
var myUser=localStorage.getItem('pu');
var socket=null,chat=null,locShare=true,watchId=null,myLoc=null;
var onlineSet=new Set(),incCard=null,unreadCount={};

function show(s){
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('gateScreen').classList.add('hidden');
  document.getElementById('appScreen').style.display='none';
  if(s==='auth')document.getElementById('authScreen').classList.remove('hidden');
  else if(s==='gate')document.getElementById('gateScreen').classList.remove('hidden');
  else if(s==='app')document.getElementById('appScreen').style.display='flex';
}

window.addEventListener('load',function(){
  if(token&&myUser)show('gate');else show('auth');
  
  // Request notification permission
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
});

document.getElementById('loginBtn').addEventListener('click',function(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){setErr('authErr','Fill both fields');return;}
  api('/api/login',{method:'POST',body:{username:u,password:p}}).then(function(r){
    if(r.error){setErr('authErr',r.error);return;}
    save(r.token,r.username);show('gate');
  });
});

document.getElementById('signupBtn').addEventListener('click',function(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){setErr('authErr','Fill both fields');return;}
  api('/api/signup',{method:'POST',body:{username:u,password:p}}).then(function(r){
    if(r.error){setErr('authErr',r.error);return;}
    save(r.token,r.username);show('gate');
  });
});

document.getElementById('gateBtn').addEventListener('click',function(){
  if(!navigator.geolocation){setErr('gateErr','Not supported');return;}
  document.getElementById('gateBtn').textContent='Getting location...';
  document.getElementById('gateBtn').disabled=true;
  navigator.geolocation.getCurrentPosition(function(pos){
    myLoc={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
    openApp();
  },function(){
    setErr('gateErr','Location denied. Please allow.');
    document.getElementById('gateBtn').disabled=false;
    document.getElementById('gateBtn').textContent='Allow location & open app';
  },{enableHighAccuracy:true,timeout:10000});
});

document.getElementById('logoutBtn').addEventListener('click',function(){
  localStorage.removeItem('pt');localStorage.removeItem('pu');
  token=null;myUser=null;
  if(socket)socket.disconnect();
  if(watchId)navigator.geolocation.clearWatch(watchId);
  show('auth');
});

document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('msgIn').addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});

function save(t,u){token=t;myUser=u;localStorage.setItem('pt',t);localStorage.setItem('pu',u);}
function setErr(id,msg){document.getElementById(id).textContent=msg;}

function openApp(){
  document.getElementById('myName').textContent=myUser;
  show('app');
  connectSocket();
  loadUsers();
  startWatch();
}

function connectSocket(){
  socket=io({auth:{token:token}});
  
  socket.on('user_online',function(d){
    onlineSet.add(d.username);
    refreshDots();
    if(chat===d.username){
      document.getElementById('chatStatus').textContent='🟢 Online';
      document.getElementById('chatStatus').className='online';
      document.getElementById('chatDot').className='odot2 on';
    }
  });
  
  socket.on('user_offline',function(d){
    onlineSet.delete(d.username);
    refreshDots();
    if(chat===d.username){
      document.getElementById('chatStatus').textContent='⚫ Offline';
      document.getElementById('chatStatus').className='';
      document.getElementById('chatDot').className='odot2';
    }
  });
  
  socket.on('receive_message',function(d){
    if(d.from===chat){
      addMsg(d.from,d.text,d.createdAt);
    } else {
      // Unread count
      unreadCount[d.from]=(unreadCount[d.from]||0)+1;
      updateUnread(d.from);
      // Notification
      sendNotification(d.from, d.text);
    }
  });
  
  socket.on('location_received',function(d){
    if(d.from===chat)updateLocCard(d.from,d.lat,d.lng,d.accuracy);
  });
}

function sendNotification(from, text){
  if('Notification' in window && Notification.permission==='granted' && document.hidden){
    new Notification('⚡ Pulse — '+from, {
      body: text,
      icon: 'https://i.ibb.co/LDy7PpM4/image.png'
    });
  }
}

function loadUsers(){
  api('/api/users').then(function(users){
    var list=document.getElementById('userList');
    if(!users||users.error||users.length===0){
      list.innerHTML='<div style="padding:1rem;color:#7C8696;font-size:0.8rem;">No users yet</div>';return;
    }
    list.innerHTML='';
    users.forEach(function(u){
      var d=document.createElement('div');
      d.className='uitem';d.dataset.u=u.username;
      var isOn=onlineSet.has(u.username);
      var unread=unreadCount[u.username]||0;
      d.innerHTML='<div class="uav">'+u.username[0].toUpperCase()+'<div class="odot'+(isOn?' on':'')+'"></div></div><span class="uname">'+u.username+'</span>'+(unread>0?'<span class="unread">'+unread+'</span>':'');
      d.addEventListener('click',function(){openChat(u.username);});
      list.appendChild(d);
    });
  });
  setTimeout(loadUsers, 30000);
}

function refreshDots(){
  document.querySelectorAll('.uitem').forEach(function(i){
    var dot=i.querySelector('.odot');
    if(dot)dot.className='odot'+(onlineSet.has(i.dataset.u)?' on':'');
  });
}

function updateUnread(username){
  var item=document.querySelector('.uitem[data-u="'+username+'"]');
  if(!item)return;
  var existing=item.querySelector('.unread');
  var count=unreadCount[username]||0;
  if(count>0){
    if(existing)existing.textContent=count;
    else item.innerHTML+='<span class="unread">'+count+'</span>';
  }
}

function openChat(username){
  chat=username;incCard=null;
  unreadCount[username]=0;
  
  document.getElementById('nochat').style.display='none';
  document.getElementById('chatHd').style.display='flex';
  document.getElementById('comp').style.display='flex';
  document.getElementById('chatAv').innerHTML=username[0].toUpperCase()+'<div class="odot2'+(onlineSet.has(username)?' on':'')+'"></div>';
  document.getElementById('chatName').textContent=username;
  
  var isOn=onlineSet.has(username);
  document.getElementById('chatStatus').textContent=isOn?'🟢 Online':'⚫ Offline';
  document.getElementById('chatStatus').className=isOn?'online':'';
  
  document.querySelectorAll('.uitem').forEach(function(i){
    i.classList.toggle('active',i.dataset.u===username);
    if(i.dataset.u===username){
      var unread=i.querySelector('.unread');
      if(unread)unread.remove();
    }
  });
  
  var msgs=document.getElementById('msgs');
  msgs.innerHTML='';
  
  api('/api/messages/'+username).then(function(h){
    if(h&&!h.error&&h.length>0){h.forEach(function(m){addMsg(m.from,m.text,m.createdAt,false);});}
    else{msgs.innerHTML='<div class="nochat"><span style="font-size:2rem;">💬</span><span>No messages yet!</span></div>';}
    msgs.scrollTop=msgs.scrollHeight;
  });
  
  if(locShare&&myLoc&&socket)socket.emit('location_update',{to:username,lat:myLoc.lat,lng:myLoc.lng,accuracy:myLoc.accuracy});
}

function sendMsg(){
  var inp=document.getElementById('msgIn');
  var txt=inp.value.trim();
  if(!txt||!chat||!socket)return;
  socket.emit('send_message',{to:chat,text:txt});
  addMsg(myUser,txt,new Date());
  inp.value='';
}

function addMsg(from,text,time,scroll){
  if(scroll===undefined)scroll=true;
  var msgs=document.getElementById('msgs');
  var nochat=msgs.querySelector('.nochat');if(nochat)nochat.remove();
  var isMe=from===myUser;
  var row=document.createElement('div');
  row.className='mrow '+(isMe?'me':'them');
  var t=new Date(time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  row.innerHTML='<div class="mbub">'+esc(text)+'<div style="font-size:0.6rem;color:#7C8696;margin-top:3px;text-align:'+(isMe?'right':'left')+'">'+t+'</div></div>';
  msgs.appendChild(row);
  if(scroll)msgs.scrollTop=msgs.scrollHeight;
}

function startWatch(){
  if(!navigator.geolocation)return;
  watchId=navigator.geolocation.watchPosition(function(pos){
    myLoc={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy};
    if(locShare&&chat&&socket)socket.emit('location_update',{to:chat,lat:myLoc.lat,lng:myLoc.lng,accuracy:myLoc.accuracy});
  },function(){},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}

function updateLocCard(from,lat,lng,acc){
  var msgs=document.getElementById('msgs');
  var mapUrl='https://maps.google.com/maps?q='+lat+','+lng+'&z=15&output=embed';
  
  if(!incCard){
    incCard=document.createElement('div');
    incCard.className='mrow them';
    incCard.innerHTML='<div class="loc-card"><iframe class="map-frame" id="locMap" src="'+mapUrl+'" allowfullscreen></iframe><div class="loc-info"><div class="loc-label"><span class="pdot"></span> '+from+'\'s live location</div><div class="loc-coords" id="locCoords">'+lat.toFixed(5)+'°N, '+lng.toFixed(5)+'°E · ±'+Math.round(acc)+'m</div></div></div>';
    msgs.appendChild(incCard);
  } else {
    var iframe=document.getElementById('locMap');
    if(iframe)iframe.src=mapUrl;
    var c=document.getElementById('locCoords');
    if(c)c.textContent=lat.toFixed(5)+'°N, '+lng.toFixed(5)+'°E · ±'+Math.round(acc)+'m';
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function api(path,opts){
  opts=opts||{};
  return fetch(path,{
    method:opts.method||'GET',
    headers:{'Content-Type':'application/json',Authorization:token?'Bearer '+token:''},
    body:opts.body?JSON.stringify(opts.body):undefined
  }).then(function(r){return r.json();}).catch(function(){return{error:'Network error'};});
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
  </html>
